<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Film Wedding Days — Business Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=16" />
    <script>
      // Apply saved theme before paint to avoid a flash
      (function () {
        try {
          var t = localStorage.getItem("fwds-theme");
          if (!t) t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <header class="site-header">
      <a href="#/" class="brand">
        <img src="assets/logo.svg" alt="Film Wedding Days" class="brand-logo" />
        <span class="brand-text">
          <span class="brand-name">Film Wedding Days</span>
          <span class="brand-tagline">Cinematic Weddings · Studio Ledger</span>
        </span>
      </a>
      <div class="header-right">
        <nav class="main-nav desktop-nav" aria-label="Main">
          <a href="#/" data-route="dashboard">Dashboard</a>
          <a href="#/calendar" data-route="calendar">Calendar</a>
          <a href="#/orders" data-route="orders">Orders</a>
          <a href="#/leads" data-route="leads">Leads</a>
          <a href="#/team" data-route="team">Team</a>
          <a href="#/reports" data-route="reports">Reports</a>
        </nav>
        <div class="theme-switch" role="group" aria-label="Theme">
          <button type="button" class="theme-opt" data-theme-value="light" title="Light" aria-label="Light mode">☀️</button>
          <button type="button" class="theme-opt" data-theme-value="dark" title="Dark" aria-label="Dark mode">🌙</button>
          <button type="button" class="theme-opt" data-theme-value="black" title="Midnight Black" aria-label="Midnight Black mode">✨</button>
        </div>
      </div>
    </header>

    <main id="app-main" class="main"></main>

    <nav class="bottom-nav" aria-label="Mobile">
      <a href="#/" data-route="dashboard"><span class="nav-icon">◆</span>Home</a>
      <a href="#/calendar" data-route="calendar"><span class="nav-icon">▦</span>Calendar</a>
      <a href="#/orders" data-route="orders"><span class="nav-icon">☰</span>Orders</a>
      <a href="#/leads" data-route="leads"><span class="nav-icon">✦</span>Leads</a>
      <a href="#/team" data-route="team"><span class="nav-icon">◎</span>Team</a>
    </nav>

    <button type="button" class="fab" id="fab-new-order" aria-label="New order">+ New Order</button>

    <footer class="site-footer">
      <span>Data saved in this browser only</span>
      <div class="footer-actions">
        <span id="footer-message" class="footer-message" hidden></span>
        <button type="button" id="btn-export">Export Backup JSON</button>
        <button type="button" id="btn-import">Import Backup JSON</button>
        <input type="file" id="import-file" accept=".json,application/json" hidden />
        <button type="button" id="btn-history">Save history</button>
      </div>
    </footer>

    <div id="history-overlay" class="overlay center" hidden>
      <div class="form-modal history-modal" role="dialog" aria-labelledby="history-title">
        <div class="form-modal-header">
          <h2 id="history-title">Save history</h2>
          <button type="button" class="btn-icon" id="history-close" aria-label="Close">✕</button>
        </div>
        <div class="history-body" id="history-body"></div>
      </div>
    </div>

    <div id="detail-overlay" class="overlay" hidden>
      <aside class="detail-panel" id="detail-panel" role="dialog" aria-labelledby="detail-title"></aside>
    </div>

    <div id="form-overlay" class="overlay center" hidden>
      <div class="form-modal form-modal-wide" role="dialog" aria-labelledby="form-title">
        <div class="form-modal-header">
          <h2 id="form-title">New order</h2>
          <button type="button" class="btn-icon" id="form-close" aria-label="Close">✕</button>
        </div>
        <form id="order-form" class="order-form"></form>
      </div>
    </div>

    <div id="kpi-detail-modal" class="overlay center" hidden>
      <div class="form-modal form-modal-wide" role="dialog" style="max-height:90vh;overflow-y:auto">
        <div class="form-modal-header">
          <h2>Metric Details</h2>
          <button type="button" class="btn-icon" onclick="closeKpiDetail()" aria-label="Close">✕</button>
        </div>
        <div id="kpi-detail-content" class="form-modal-body" style="padding:1.5rem"></div>
      </div>
    </div>

    <script src="vendor/jspdf.umd.min.js"></script>
    <script src="vendor/jspdf.plugin.autotable.min.js"></script>
    <script src="vendor/xlsx.full.min.js"></script>
    <!-- Firebase REST API (no SDK needed) -->
    <script src="js/firebase-config.js?v=2"></script>
    <script src="js/firebase-sync.js?v=2"></script>
    <script src="js/config.js?v=16"></script>
    <script src="js/utils.js?v=16"></script>
    <script src="js/model.js?v=16"></script>
    <script src="js/storage.js?v=16"></script>
    <script src="js/reports.js?v=16"></script>
    <script src="js/kpi-detail.js?v=2"></script>
    <script src="js/dashboard.js?v=16"></script>
    <script src="js/calendar.js?v=16"></script>
    <script src="js/form.js?v=16"></script>
    <script src="js/orders.js?v=16"></script>
    <script src="js/leads.js?v=16"></script>
    <script src="js/team.js?v=16"></script>
    <script src="js/customer.js?v=16"></script>
    <script src="js/app.js?v=16"></script>
  </body>
</html>
